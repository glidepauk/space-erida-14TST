- type: reagent
  id: BZ
  name: reagent-name-bz
  desc: reagent-desc-bz
  physicalDesc: reagent-physical-desc-gaseous
  flavor: bitter
  color: "#e69edd"
  metabolisms:
    Respiration:
      effects:
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: BZ
          min: 1
        - !type:MetabolizerTypeCondition
          type: [Slime]
        effectProto: StatusEffectSeeingRainbow
        time: 1
        type: Add
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: BZ
          min: 1
        ignoreResistances: true
        damage:
          types:
            Cellular: 0.005
      - !type:PopupMessage
        conditions:
        - !type:ReagentCondition
          reagent: BZ
          min: 1
        - !type:MetabolizerTypeCondition
          type: [Slime]
        type: Local
        visualType: Medium
        messages: [ "effect-sleepy" ]
        probability: 0.1
      - !type:MovementSpeedModifier
        conditions:
        - !type:ReagentCondition
          reagent: BZ
          min: 1
        - !type:MetabolizerTypeCondition
          type: [Slime]
          inverted: true
        walkSpeedModifier: 0.65
        sprintSpeedModifier: 0.65
      - !type:ModifyStatusEffect
        conditions:
        - !type:ReagentCondition
          reagent: BZ
          min: 1
        - !type:MetabolizerTypeCondition
          type: [Slime]
        effectProto: StatusEffectForcedSleeping
        time: 1
        type: Add

- type: reagent
  id: Pluoxium
  name: reagent-name-pluoxium
  desc: reagent-desc-pluoxium
  physicalDesc: reagent-physical-desc-gaseous
  flavor: bitter
  color: "#0054AA"
  boilingPoint: -183.0
  meltingPoint: -218.4
  metabolisms:
    Respiration:
      effects:
      - !type:Oxygenate
        factor: 4
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Human]
      - !type:Oxygenate
        factor: 4
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Animal]
      - !type:Oxygenate
        factor: 4
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Rat]
      - !type:Oxygenate
        factor: 4
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Plant]
      - !type:ModifyLungGas
        conditions:
        - !type:MetabolizerTypeCondition
          type: [Vox]
          inverted: false
        ratios:
          CarbonDioxide: 1.0
          Pluoxium: -1.0

