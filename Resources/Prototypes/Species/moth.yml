- type: species
  id: Moth
  name: species-name-moth
  roundStart: true
  prototype: MobMoth
  sprites: MobMothSprites
  defaultSkinTone: "#ffda93"
  markingLimits: MobMothMarkingLimits
  dollPrototype: MobMothDummy
  skinColoration: Hues
  maleFirstNames: NamesMothFirstMale
  femaleFirstNames: NamesMothFirstFemale
  maleLastNames: NamesMothLast
  femaleLastNames: NamesMothLast

- type: speciesBaseSprites
  id: MobMothSprites
  sprites:
    Head: MobMothHead
    Snout: MobHumanoidAnyMarking
    Hair: MobHumanoidAnyMarking # DS14
    # UndergarmentTop: MobHumanoidAnyMarking # DS14
    # UndergarmentBottom: MobHumanoidAnyMarking # DS14
    Chest: MobMothTorso
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobMothEyes
    LArm: MobMothLArm
    RArm: MobMothRArm
    LHand: MobMothLHand
    RHand: MobMothRHand
    LLeg: MobMothLLeg
    RLeg: MobMothRLeg
    LFoot: MobMothLFoot
    RFoot: MobMothRFoot

- type: humanoidBaseSprite
  id: MobMothEyes
  baseSprite:
    sprite: Mobs/Species/Moth/parts.rsi
    state: eyes

- type: markingPoints
  id: MobMothMarkingLimits
  # Erida-start
  onlyWhitelisted: false
  points:
    Hair:
      points: 10
      required: false
    FacialHair:
      points: 10
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ MothWingsDefault ]
    Snout:
      points: 10
      required: false
    Head:
      points: 10
      required: false
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ MothAntennasDefault ]
    HeadSide:
      points: 10
      required: false
    Chest:
      points: 10
      required: false
    Legs:
      points: 10
      required: false
    Arms:
      points: 10
      required: false
    Overlay:
      points: 10
      required: false
    # Erida-end

