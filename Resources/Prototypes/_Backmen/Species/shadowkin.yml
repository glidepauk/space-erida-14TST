- type: markingPoints
  id: MobShadowkinMarkingLimits
  points:
    # Erida-start
    Head:
      points: 10
      required: false
    HeadSide:
      points: 10
      required: false
    Hair:
      points: 10
      required: false
    FacialHair:
      points: 10
      required: false
    Snout:
      points: 10
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [TailShadowkin]
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [EarsShadowkin]
    Chest:
      points: 10
      required: false
    Legs:
      points: 10
      required: false
    Arms:
      points: 10
      required: false
    Overlay:
      points: 10
      required: false
    # Erida-end
