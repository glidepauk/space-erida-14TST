- type: entity
  abstract: true
  parent: Clothing
  id: UnsensoredClothingUniformBase
  components:
  # handling sounds edit start
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Erida/Items/handling/cloth_pickup.ogg
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Erida/Items/handling/cloth_drop.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Erida/Items/handling/cloth_drop.ogg
  # handling sounds edit end
  - type: Sprite
    state: icon
  - type: Clothing
    slots: [innerclothing]
    equipSound:
      path: /Audio/Items/jumpsuit_equip.ogg
  - type: Butcherable
    butcheringType: Knife
    spawned:
    - id: MaterialCloth1
      amount: 3
  - type: PhysicalComposition # 50% of the amount of cloth you'd obtain upon butchering
    materialComposition:
      Cloth: 150
  - type: Edible
    requiresSpecialDigestion: true
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents:
        - ReagentId: Fiber
          Quantity: 30
  - type: Tag
    tags:
    - ClothMade
    - Recyclable
    - WhitelistChameleon
  - type: SlotBlock
    blockList: [ UNDERSHIRT, UNDERPANTS, SOCKS, UNDERWEAR ]

- type: entity
  abstract: true
  parent: UnsensoredClothingUniformBase
  id: UnsensoredClothingUniformSkirtBase
  components:
  - type: Clothing
    slots: [innerclothing]
    femaleMask: UniformTop
  - type: SlotBlock
    blockList: [ UNDERSHIRT ]
    hideList: [ UNDERPANTS, UNDERWEAR ]

- type: entity
  abstract: true
  parent: UnsensoredClothingUniformBase
  id: ClothingUniformBase
  components:
  - type: SuitSensor
  - type: DeviceNetwork
    deviceNetId: Wireless
    transmitFrequencyId: SuitSensor
    savableAddress: false
  - type: WirelessNetworkConnection
    range: 1200
  - type: StationLimitedNetwork
  - type: SlotBlock
    blockList: [ UNDERSHIRT, UNDERPANTS, SOCKS, UNDERWEAR ]

- type: entity
  abstract: true
  parent: ClothingUniformBase
  id: ClothingUniformSkirtBase
  components:
  - type: Clothing
    slots: [innerclothing]
    femaleMask: UniformTop
  - type: SlotBlock
    blockList: [ UNDERSHIRT ]
    hideList: [ UNDERPANTS, UNDERWEAR ]

- type: entity
  abstract: true
  id: ClothingUniformFoldableBase
  components:
  - type: Foldable
    canFoldInsideContainer: true
    unfoldVerbText: unfold-verb-clothing-jacket
    foldVerbText: fold-verb-clothing-jacket
  - type: FoldableClothing
    foldedEquippedPrefix: folded
